---
name: translations data

on:
  workflow_dispatch:
  schedule:
    # twice per week, Monday and Friday
    - cron: "0 0 * * 1,5"

permissions:
  contents: write

jobs:
  update-translations:
    name: Update translations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install pnpm
        run: |
          npm install --global corepack@latest
          corepack enable
          corepack install
      - name: Fetch dependencies
        run: pnpm install
      - name: Build Packages
        run: pnpm build
      - name: Build package
        run: pnpm --filter @verdaccio/local-scripts run build
      - name: Update translations
        run: pnpm run translations
        env:
          TOKEN: ${{ secrets.CROWDIN_VERDACCIO_API_KEY }}
      - name: format
        run: pnpm format
      - name: Commit & Push changes
        uses: actions-js/push@5a7cbd780d82c0c937b5977586e641b2fd94acc5 # tag=v1.5
        with:
          github_token: ${{ secrets.TOKEN_VERDACCIOBOT_GITHUB }}
          message: "chore: updated translations data"
          branch: master
          author_email: verdaccio.npm@gmail.com
          author_name: verdacciobot
