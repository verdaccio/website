---
name: translations data

on:
  workflow_dispatch:
  schedule:
    # twice per week, Monday and Friday
    - cron: "0 0 * * 1,5"

permissions:
  contents: write

jobs:
  update-translations:
    name: Update translations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.CHANGESET_RELEASE_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
      - name: Install pnpm
        run: |
          npm install --global corepack@latest
          corepack enable
          corepack install
      - name: Fetch dependencies
        run: pnpm install
      - name: Build Packages
        run: pnpm build
      - name: Build package
        run: pnpm --filter @verdaccio/local-scripts run build
      - name: Update translations
        run: pnpm run translations
        env:
          TOKEN: ${{ secrets.CROWDIN_VERDACCIO_API_KEY }}
      - name: format
        run: pnpm format
      - name: Commit & push
        run: |
          git config user.name  verdacciopack
          git config user.email verdaccio.npm@gmail.com
          git add -A
          git diff --cached --quiet || git commit -m "chore: updated translations data"
          git push origin master
