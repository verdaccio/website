---
name: addon data

on:
  workflow_dispatch:
  schedule:
    # once per week on Friday
    - cron: "0 0 * * 5"

permissions:
  contents: write

jobs:
  update-addons:
    name: Update addon data
    runs-on: ubuntu-latest
    # Requires manual approval (verdacciobot) via the `metrics` environment.
    environment: metrics
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.CHANGESET_RELEASE_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
      - name: Install pnpm
        run: |
          npm install --global corepack@latest
          corepack enable
          corepack install
      - name: Fetch dependencies
        run: pnpm install
      - name: Build Packages
        run: pnpm build
      - name: Update addon data
        run: pnpm script:addon
      - name: format
        run: pnpm format
      - name: Commit & push
        run: |
          git config user.name  verdacciopack
          git config user.email verdaccio.npm@gmail.com
          git add -A
          git diff --cached --quiet || git commit -m "chore: updated addon data"
          git push origin master
