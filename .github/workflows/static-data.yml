---
name: static data

on:
  workflow_dispatch:
#  pull_request:
  # schedule:
    # twice peer week
    # - cron: "0 0 * * 1,4"
  # for now, scheduled, we can enable on push master but not make much sense now
  # push:
  #   branches:
  #     - master

permissions:
  contents: write

jobs:
  prepare:
    name: Run script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
      - name: Install pnpm
        run: |
          npm install --global corepack@latest
          corepack enable
          corepack install
      - name: Fetch dependencies
        run: pnpm install
      - name: Build Packages
        run: pnpm build
      - name: Build package
        run: pnpm --filter @verdaccio/local-scripts run build
      - name: Fetch all download stats
        run: pnpm --filter @verdaccio/local-scripts run downloads:all
      - name: Contributors update
        run: pnpm --filter @verdaccio/local-scripts run contributors:update
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: update addon data
        run: pnpm script:addon
      - name: update translations
        run: pnpm run translations
        env:
          TOKEN: ${{ secrets.CROWDIN_VERDACCIO_API_KEY }}
      - name: format
        run: pnpm format
      - name: Commit & Push changes
        run: |
          git config user.name "verdacciobot"
          git config user.email "verdaccio.npm@gmail.com"
          git add -A
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: updated static data"
          git push origin master
