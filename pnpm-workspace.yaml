packages:
  - packages/tools/*
  - website
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@verdaccio/*'
  - 'verdaccio-*'
  # Renovate security update: dompurify@3.4.0
  - dompurify@3.4.0
saveExact: true
onlyBuiltDependencies:
  - '@parcel/watcher'
  - core-js
  - core-js-pure
  - esbuild
allowBuilds:
  '@parcel/watcher': true
  core-js: true
  core-js-pure: true
  esbuild: true
ignoreScripts: true
