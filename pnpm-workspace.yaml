packages:
  - packages/tools/*
  - website
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@verdaccio/*'
  - 'verdaccio-*'
  # Renovate security update: dompurify@3.4.9 || 3.4.11
  - dompurify@3.4.9 || 3.4.11
  # Renovate security update: @babel/core@7.29.6
  - "@babel/core@7.29.6"
saveExact: true
onlyBuiltDependencies:
  - '@parcel/watcher'
  - core-js
  - core-js-pure
  - esbuild
allowBuilds:
  '@parcel/watcher': true
  core-js: true
  core-js-pure: true
  esbuild: true
ignoreScripts: true
preferFrozenLockfile: true
